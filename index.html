<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSFS Flight Planner</title>

<style>
:root {
  --bg-1:#050816;
  --bg-2:#0a1130;
  --bg-3:#04060f;
  --border:rgba(255,255,255,0.08);
  --text:#fff;
  --purple:#7c5cff;
  --blue:#4ca7ff;
  --transition:0.4s cubic-bezier(0.22,1,0.36,1);
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Inter,system-ui;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 20%, rgba(124,92,255,0.2), transparent),
    radial-gradient(circle at 85% 20%, rgba(76,167,255,0.15), transparent),
    linear-gradient(160deg,var(--bg-1),var(--bg-2),var(--bg-3));
  overflow:hidden;
}

.page-wrap{height:100vh;position:relative;}

.screen{
  position:absolute;
  inset:0;
  padding:24px;
  transition:all var(--transition);
}

.home{display:flex;align-items:center;justify-content:center;}

.admin,.passenger,.addFlight{
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
}

.admin-open .admin,
.passenger-open .passenger,
.add-open .addFlight{
  opacity:1;
  transform:translateY(0);
  pointer-events:all;
}

.admin-open .home,
.passenger-open .home,
.add-open .admin{
  opacity:0;
  pointer-events:none;
}

.card{
  width:100%;
  max-width:1200px;
  margin:auto;
  border-radius:30px;
  padding:30px;
  background:rgba(20,25,60,0.7);
  border:1px solid var(--border);
}

.option{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  border:1px solid var(--border);
  cursor:pointer;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:40px;
}

.left{
  display:flex;
  gap:12px;
  align-items:center;
}

.back{
  width:40px;height:40px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  cursor:pointer;
}

.right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:10px;
}

.badge{
  padding:8px 14px;
  border-radius:20px;
  border:1px solid var(--border);
  font-size:14px;
}

.add-btn{
  padding:10px 16px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:white;
  font-weight:600;
  cursor:pointer;
}

.title{
  font-size:42px;
  font-weight:800;
}

.line{
  height:2px;
  background:white;
  margin-top:10px;
}

/* FORM */
.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.form input{
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:white;
}

.full{grid-column:span 2;}

.simple-list{
  margin-top:20px;
  font-size:14px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="page-wrap" id="wrap">

<!-- HOME -->
<div class="screen home">
  <div class="card">
    <h2>MSFS Flight Planner</h2>
    <div class="option" id="adminBtn">Admin Login</div>
    <div class="option" id="passengerBtn">Passenger Login</div>
  </div>
</div>

<!-- ADMIN -->
<div class="screen admin">
  <div class="card">

    <div class="topbar">
      <div class="left">
        <button class="back" id="backBtn">←</button>
        <div>
          <div style="font-size:12px;color:gray;">MANAGEMENT VIEW</div>
          <div style="font-weight:600;">Admin Dashboard</div>
        </div>
      </div>

      <div class="right">
        <div class="badge">Flight Planning System</div>
        <button class="add-btn" id="addFlightBtn">Add flight</button>
      </div>
    </div>

    <div class="title">Flights (<span id="flightCount">0</span>)</div>
    <div class="line"></div>

    <div class="simple-list" id="flightList"></div>

  </div>
</div>

<!-- ADD FLIGHT -->
<div class="screen addFlight">
  <div class="card">

    <div class="topbar">
      <div class="left">
        <button class="back" id="addBack">←</button>
        <div>
          <div style="font-size:12px;color:gray;">CREATE FLIGHT</div>
          <div style="font-weight:600;">New Flight</div>
        </div>
      </div>
    </div>

    <div class="form">
      <input id="dep" placeholder="Departure Airport">
      <input id="arr" placeholder="Arrival Airport">

      <input id="depTime" type="datetime-local">
      <input id="arrTime" type="datetime-local">

      <input id="icao" placeholder="Airline ICAO">
      <input id="flightNum" placeholder="Flight Number">

      <input id="dist" placeholder="Distance (NM)">
      <input id="tz" placeholder="Timezone Diff">
    </div>

    <br>
    <button class="add-btn" id="submitFlight">Add flight</button>

  </div>
</div>

<!-- PASSENGER -->
<div class="screen passenger">
  <div class="card">
    <div class="title">Flights (0)</div>
    <div class="line"></div>
  </div>
</div>

</div>

<script>
const wrap = document.getElementById("wrap");

let flights = [];

adminBtn.onclick=()=>{wrap.classList.add("admin-open");wrap.classList.remove("passenger-open");}
passengerBtn.onclick=()=>{wrap.classList.add("passenger-open");wrap.classList.remove("admin-open");}
backBtn.onclick=()=>wrap.classList.remove("admin-open");

addFlightBtn.onclick=()=>wrap.classList.add("add-open");
addBack.onclick=()=>wrap.classList.remove("add-open");

/* ADD FLIGHT LOGIC */
submitFlight.onclick=()=>{
  const flight = {
    dep: dep.value,
    arr: arr.value,
    num: flightNum.value
  };

  flights.push(flight);

  document.getElementById("flightCount").textContent = flights.length;

  const list = document.getElementById("flightList");
  list.innerHTML = flights.map(f =>
    `${f.num} — ${f.dep} → ${f.arr}`
  ).join("<br>");

  wrap.classList.remove("add-open");
};
</script>

</body>
</html>
