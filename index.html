<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSFS Flight Tracker</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(91, 95, 255, 0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(0, 194, 255, 0.12), transparent 30%),
        #070b18;
      color: white;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 18px;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .page-header {
      padding-top: 12px;
      position: relative;
    }

    .page-title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1;
    }

    .header-line {
      width: 100%;
      height: 1px;
      margin-top: 18px;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0.85),
        rgba(120, 155, 255, 0.45),
        rgba(255, 255, 255, 0.08)
      );
    }

    .edit-button {
      position: absolute;
      right: 0;
      bottom: -18px;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .edit-button:hover {
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .edit-button:active {
      transform: scale(0.92);
    }

    .edit-button svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    .flights-list {
      margin-top: 38px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .flight-card {
      width: 100%;
      min-height: 104px;
      padding: 16px 0;
      display: grid;
      grid-template-columns: 74px 1fr auto;
      align-items: center;
      gap: 12px;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: transparent;
      color: white;
      text-align: left;
      cursor: pointer;
      animation: flightCardIn 0.42s cubic-bezier(0.16, 1, 0.3, 1);
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .flight-card:active {
      transform: scale(0.985);
      opacity: 0.82;
    }

    @keyframes flightCardIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo-space {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .flight-main {
      min-width: 0;
    }

    .flight-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.48);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flight-route-arrow {
      opacity: 0.45;
    }

    .flight-cities {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.7px;
      line-height: 1.08;
      color: rgba(255, 255, 255, 0.96);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flight-date-display {
      align-self: start;
      padding-top: 2px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .add-flight-page {
      position: fixed;
      inset: 0;
      min-height: 100vh;
      padding: 30px 38px;
      background:
        radial-gradient(circle at top left, rgba(91, 95, 255, 0.20), transparent 34%),
        radial-gradient(circle at top right, rgba(0, 194, 255, 0.12), transparent 30%),
        #070b18;
      opacity: 0;
      pointer-events: none;
      transform: translateX(34px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      overflow-y: auto;
    }

    .add-flight-page.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .app.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-24px);
    }

    .add-flight-container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .add-flight-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-button {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .back-button:active {
      transform: scale(0.92);
    }

    .back-button svg {
      width: 19px;
      height: 19px;
      fill: currentColor;
    }

    .add-flight-title {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.9px;
      line-height: 1;
    }

    .flight-form {
      margin-top: 24px;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.045)),
        rgba(255, 255, 255, 0.04);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 13px;
    }

    .form-field {
      position: relative;
    }

    .form-field label {
      display: block;
      margin-bottom: 7px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15px;
    }

    .form-field input {
      width: 100%;
      height: 50px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      outline: none;
      padding: 0 14px;
      background: rgba(5, 10, 24, 0.58);
      color: white;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0.1px;
      transition:
        border-color 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease,
        transform 0.25s ease;
    }

    .form-field input::placeholder {
      color: rgba(255, 255, 255, 0.32);
      font-weight: 600;
    }

    .form-field input:hover {
      background: rgba(8, 15, 34, 0.72);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .form-field input:focus {
      border-color: rgba(120, 155, 255, 0.95);
      background: rgba(8, 15, 34, 0.86);
      box-shadow:
        0 0 0 1px rgba(0, 194, 255, 0.42),
        0 0 0 5px rgba(91, 95, 255, 0.16),
        0 16px 38px rgba(0, 0, 0, 0.22);
      transform: translateY(-1px);
    }

    .form-actions {
      margin-top: 22px;
      display: flex;
      justify-content: flex-end;
    }

    .add-flight-button {
      min-width: 190px;
      height: 54px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #16e18a, #0fbf75, #069b61);
      color: white;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.1px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow:
        0 18px 42px rgba(12, 190, 113, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.35);
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        filter 0.25s ease;
    }

    .add-flight-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
      box-shadow:
        0 24px 54px rgba(12, 190, 113, 0.40),
        inset 0 1px 0 rgba(255, 255, 255, 0.38);
    }

    .add-flight-button:active {
      transform: scale(0.97);
    }

    .add-flight-button svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .detail-page {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(10, 10, 18, 0.98);
      color: white;
      opacity: 0;
      pointer-events: none;
      transform: translateY(28px);
      transition:
        opacity 0.38s ease,
        transform 0.48s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
    }

    .detail-page.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .detail-shell {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: #12121a;
    }

    .detail-top {
      position: relative;
      padding: 38px 24px 34px;
      display: grid;
      grid-template-columns: 78px 1fr 74px;
      align-items: center;
      gap: 12px;
      background: #15151d;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .detail-logo-space {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .detail-title-wrap {
      min-width: 0;
    }

    .detail-meta {
      color: rgba(255, 255, 255, 0.52);
      font-size: 21px;
      font-weight: 850;
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-route-title {
      margin-top: 8px;
      font-size: 30px;
      font-weight: 950;
      letter-spacing: -1px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-close-button {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(255, 255, 255, 0.04);
      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .detail-close-button:active {
      transform: scale(0.92);
    }

    .detail-close-button svg {
      width: 34px;
      height: 34px;
      stroke: currentColor;
      stroke-width: 3;
      stroke-linecap: round;
    }

    .gate-status-panel {
      padding: 28px 24px 30px;
      background: linear-gradient(135deg, rgba(0, 78, 36, 0.92), rgba(0, 45, 22, 0.95));
      border-bottom: 1px solid rgba(35, 220, 126, 0.18);
    }

    .gate-status-title {
      color: #20d47a;
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -0.8px;
      line-height: 1.1;
    }

    .detail-content {
      padding: 34px 24px 44px;
    }

    .airport-row-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -0.45px;
      line-height: 1.15;
    }

    .direction-dot {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: white;
      color: #15151d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .direction-dot svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .airport-chevron {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 3.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.92;
      flex: 0 0 auto;
    }

    .big-time {
      margin-top: 20px;
      color: #20d47a;
      font-size: 56px;
      font-weight: 1000;
      letter-spacing: -2.4px;
      line-height: 0.95;
    }

    .time-status-line {
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.58);
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.25px;
    }

    .on-time {
      color: #20d47a;
      font-weight: 950;
    }

    .mid-flight-line {
      margin: 30px 0;
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(255, 255, 255, 0.26);
      font-size: 20px;
      font-weight: 850;
      letter-spacing: -0.35px;
    }

    .mid-flight-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.22);
      position: relative;
      flex: 0 0 auto;
    }

    .mid-flight-icon::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 3px;
      left: 7px;
      top: 9px;
      background: rgba(255, 255, 255, 0.26);
      border-radius: 999px;
      transform-origin: right center;
      transform: rotate(-90deg);
    }

    .mid-flight-line::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.17);
    }

    .notification-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.34s ease;
    }

    .notification-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .flight-added-popup {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 60;
      width: min(420px, calc(100% - 36px));
      padding: 3px;
      border-radius: 26px;
      background: linear-gradient(90deg, #16e18a, #5dffb5, #0fbf75);
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.45),
        0 18px 52px rgba(12, 190, 113, 0.24);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 90vh) scale(0.96);
      transition:
        opacity 0.42s ease,
        transform 0.52s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .flight-added-popup.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .flight-added-popup.dismiss {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -125vh) scale(0.96);
    }

    .popup-inner {
      min-height: 112px;
      border-radius: 23px;
      background:
        radial-gradient(circle at top left, rgba(22, 225, 138, 0.15), transparent 45%),
        rgba(7, 11, 24, 0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .popup-title {
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.45px;
      color: white;
    }

    @media (max-width: 1000px) {
      .form-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .add-flight-page {
        padding: 28px 18px;
      }

      .add-flight-title {
        font-size: 32px;
      }

      .flight-form {
        padding: 20px;
        border-radius: 24px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-actions {
        justify-content: stretch;
      }

      .add-flight-button {
        width: 100%;
      }
    }

    @media (max-width: 430px) {
      .flight-card {
        grid-template-columns: 58px 1fr;
      }

      .flight-date-display {
        grid-column: 2;
        padding-top: 0;
        margin-top: -4px;
        font-size: 14px;
      }

      .logo-space {
        width: 46px;
        height: 46px;
        border-radius: 15px;
      }

      .flight-meta {
        font-size: 16px;
      }

      .flight-cities {
        font-size: 20px;
      }

      .detail-top {
        grid-template-columns: 58px 1fr 58px;
        padding: 36px 20px 30px;
      }

      .detail-logo-space {
        width: 46px;
        height: 46px;
        border-radius: 15px;
      }

      .detail-meta {
        font-size: 18px;
      }

      .detail-route-title {
        font-size: 26px;
      }

      .detail-close-button {
        width: 56px;
        height: 56px;
      }

      .detail-close-button svg {
        width: 30px;
        height: 30px;
      }

      .gate-status-panel {
        padding: 26px 20px 28px;
      }

      .gate-status-title {
        font-size: 25px;
      }

      .detail-content {
        padding: 32px 20px 42px;
      }

      .airport-row-title {
        font-size: 22px;
      }

      .big-time {
        font-size: 52px;
      }

      .time-status-line {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>
  <main class="app" id="flightsPage">
    <header class="page-header">
      <h1 class="page-title">Flights</h1>

      <div class="header-line"></div>

      <button class="edit-button" id="editButton" aria-label="Edit flights">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M16.86 3.49a1.75 1.75 0 0 1 2.48 0l1.17 1.17a1.75 1.75 0 0 1 0 2.48L9.62 18.03a2.25 2.25 0 0 1-.93.56l-4.05 1.16a.9.9 0 0 1-1.11-1.11l1.16-4.05c.1-.35.29-.67.56-.93L16.86 3.49Zm1.41 1.41L6.66 16.51l-.55 1.93 1.93-.55L19.65 6.28 18.27 4.9Z" />
        </svg>
      </button>
    </header>

    <section class="flights-list" id="flightsList"></section>
  </main>

  <section class="add-flight-page" id="addFlightPage">
    <div class="add-flight-container">
      <header class="add-flight-header">
        <button class="back-button" id="backButton" aria-label="Back to flights">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15.53 4.47a.75.75 0 0 1 0 1.06L9.06 12l6.47 6.47a.75.75 0 1 1-1.06 1.06l-7-7a.75.75 0 0 1 0-1.06l7-7a.75.75 0 0 1 1.06 0Z" />
          </svg>
        </button>

        <h1 class="add-flight-title">Add flight</h1>
      </header>

      <form class="flight-form" id="flightForm">
        <div class="form-grid">
          <div class="form-field">
            <label for="airline">Airline</label>
            <input id="airline" type="text" maxlength="2" placeholder="AA" />
          </div>

          <div class="form-field">
            <label for="flightNumber">Flight number</label>
            <input id="flightNumber" type="text" inputmode="numeric" maxlength="4" placeholder="2247" />
          </div>

          <div class="form-field">
            <label for="departureAirport">Departure airport</label>
            <input id="departureAirport" type="text" maxlength="4" placeholder="CLT" />
          </div>

          <div class="form-field">
            <label for="arrivalAirport">Arrival airport</label>
            <input id="arrivalAirport" type="text" maxlength="4" placeholder="JFK" />
          </div>

          <div class="form-field">
            <label for="cityDeparture">City departure</label>
            <input id="cityDeparture" type="text" placeholder="Charlotte" />
          </div>

          <div class="form-field">
            <label for="cityArrival">City arrival</label>
            <input id="cityArrival" type="text" placeholder="New York" />
          </div>

          <div class="form-field">
            <label for="flightDate">Flight date</label>
            <input id="flightDate" type="date" />
          </div>

          <div class="form-field">
            <label for="scheduledDeparture">Scheduled departure time</label>
            <input id="scheduledDeparture" type="time" />
          </div>

          <div class="form-field">
            <label for="scheduledArrival">Scheduled arrival time</label>
            <input id="scheduledArrival" type="time" />
          </div>

          <div class="form-field">
            <label for="flightTime">Flight time</label>
            <input id="flightTime" type="text" placeholder="2h 10m" />
          </div>

          <div class="form-field">
            <label for="timezoneDifference">Timezone difference</label>
            <input id="timezoneDifference" type="text" placeholder="-6 or +5" />
          </div>

          <div class="form-field">
            <label for="departureTaxiTime">Departure taxi time</label>
            <input id="departureTaxiTime" type="text" placeholder="18m" />
          </div>

          <div class="form-field">
            <label for="arrivalTaxiTime">Arrival taxi time</label>
            <input id="arrivalTaxiTime" type="text" placeholder="9m" />
          </div>

          <div class="form-field">
            <label for="airTime">Air time</label>
            <input id="airTime" type="text" placeholder="1h 43m" />
          </div>
        </div>

        <div class="form-actions">
          <button class="add-flight-button" id="addFlightButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21.72 4.56c.35.83.06 1.8-.68 2.3l-5.95 4.01 1.75 7.12a.86.86 0 0 1-1.29.93l-3.93-2.45-3.22 2.17.37 2.09a.74.74 0 0 1-1.1.77l-2.16-1.34-2.16 1.34a.74.74 0 0 1-1.1-.77l.72-4.07a1.7 1.7 0 0 1 .7-1.1l3.26-2.2-4.72-2.94a.86.86 0 0 1 .14-1.53l7.09-2.57 5.95-4.02a1.93 1.93 0 0 1 2.33.26ZM16.22 4.2 10.53 8.04a1 1 0 0 1-.22.11L4.6 10.22l4.34 2.71a.85.85 0 0 1 .02 1.43l-4.39 2.96-.35 1.98.88-.55a.74.74 0 0 1 .78 0l.88.55-.17-.96a.74.74 0 0 1 .31-.73l4.27-2.88a.85.85 0 0 1 .93-.02l2.62 1.64-1.43-5.82a1 1 0 0 1 .4-1.05l6.26-4.22a.43.43 0 0 0 .15-.51.43.43 0 0 0-.52-.25Z" />
            </svg>
            Add flight
          </button>
        </div>
      </form>
    </div>
  </section>

  <section class="detail-page" id="detailPage">
    <div class="detail-shell">
      <header class="detail-top">
        <div class="detail-logo-space" aria-label="Airline logo space"></div>

        <div class="detail-title-wrap">
          <div class="detail-meta" id="detailMeta">AA 0000 • DEP → ARR</div>
          <div class="detail-route-title" id="detailRouteTitle">Departure to Arrival</div>
        </div>

        <button class="detail-close-button" id="detailCloseButton" aria-label="Close flight details">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6L18 18M18 6L6 18"></path>
          </svg>
        </button>
      </header>

      <section class="gate-status-panel">
        <div class="gate-status-title" id="gateStatusTitle">Gate Departure in --</div>
      </section>

      <main class="detail-content">
        <section class="airport-section">
          <div class="airport-row-title">
            <span class="direction-dot">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7.05 16.95a1.25 1.25 0 0 1 0-1.77L13.23 9H9.25a1.25 1.25 0 0 1 0-2.5h7a1.25 1.25 0 0 1 1.25 1.25v7a1.25 1.25 0 0 1-2.5 0v-3.98l-6.18 6.18a1.25 1.25 0 0 1-1.77 0Z" />
              </svg>
            </span>
            <span id="detailDepartureAirport">DEP • Departure</span>
            <svg class="airport-chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 5l7 7-7 7"></path>
            </svg>
          </div>

          <div class="big-time" id="detailDepartureTime">--:--</div>
          <div class="time-status-line">
            <span class="on-time">On Time</span>
            <span> • </span>
            <span id="detailDepartureCountdown">Departs in --</span>
          </div>
        </section>

        <div class="mid-flight-line">
          <span class="mid-flight-icon"></span>
          <span id="detailFlightDuration">--</span>
        </div>

        <section class="airport-section">
          <div class="airport-row-title">
            <span class="direction-dot">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M16.95 7.05a1.25 1.25 0 0 1 0 1.77L10.77 15h3.98a1.25 1.25 0 0 1 0 2.5h-7a1.25 1.25 0 0 1-1.25-1.25v-7a1.25 1.25 0 0 1 2.5 0v3.98l6.18-6.18a1.25 1.25 0 0 1 1.77 0Z" />
              </svg>
            </span>
            <span id="detailArrivalAirport">ARR • Arrival</span>
            <svg class="airport-chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 5l7 7-7 7"></path>
            </svg>
          </div>

          <div class="big-time" id="detailArrivalTime">--:--</div>
          <div class="time-status-line">
            <span class="on-time">On Time</span>
            <span> • </span>
            <span id="detailArrivalCountdown">Arrives in --</span>
          </div>
        </section>
      </main>
    </div>
  </section>

  <div class="notification-overlay" id="notificationOverlay"></div>

  <div class="flight-added-popup" id="flightAddedPopup" role="button" tabindex="0" aria-label="Dismiss flight added notification">
    <div class="popup-inner">
      <div class="popup-title">Flight added!</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAehW0Ab5c0bpb824JyPBa43YBvyR7zwig",
      authDomain: "msfs-flight-tracker.firebaseapp.com",
      projectId: "msfs-flight-tracker",
      storageBucket: "msfs-flight-tracker.firebasestorage.app",
      messagingSenderId: "477994284624",
      appId: "1:477994284624:web:50bef41d84258420ea8355"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const editButton = document.getElementById("editButton");
    const backButton = document.getElementById("backButton");
    const flightsPage = document.getElementById("flightsPage");
    const addFlightPage = document.getElementById("addFlightPage");
    const flightForm = document.getElementById("flightForm");
    const addFlightButton = document.getElementById("addFlightButton");
    const notificationOverlay = document.getElementById("notificationOverlay");
    const flightAddedPopup = document.getElementById("flightAddedPopup");
    const flightsList = document.getElementById("flightsList");

    const detailPage = document.getElementById("detailPage");
    const detailCloseButton = document.getElementById("detailCloseButton");
    const detailMeta = document.getElementById("detailMeta");
    const detailRouteTitle = document.getElementById("detailRouteTitle");
    const gateStatusTitle = document.getElementById("gateStatusTitle");
    const detailDepartureAirport = document.getElementById("detailDepartureAirport");
    const detailDepartureTime = document.getElementById("detailDepartureTime");
    const detailDepartureCountdown = document.getElementById("detailDepartureCountdown");
    const detailFlightDuration = document.getElementById("detailFlightDuration");
    const detailArrivalAirport = document.getElementById("detailArrivalAirport");
    const detailArrivalTime = document.getElementById("detailArrivalTime");
    const detailArrivalCountdown = document.getElementById("detailArrivalCountdown");

    const airlineInput = document.getElementById("airline");
    const flightNumberInput = document.getElementById("flightNumber");
    const departureAirportInput = document.getElementById("departureAirport");
    const arrivalAirportInput = document.getElementById("arrivalAirport");
    const cityDepartureInput = document.getElementById("cityDeparture");
    const cityArrivalInput = document.getElementById("cityArrival");
    const flightDateInput = document.getElementById("flightDate");
    const scheduledDepartureInput = document.getElementById("scheduledDeparture");
    const scheduledArrivalInput = document.getElementById("scheduledArrival");
    const flightTimeInput = document.getElementById("flightTime");
    const timezoneDifferenceInput = document.getElementById("timezoneDifference");
    const departureTaxiTimeInput = document.getElementById("departureTaxiTime");
    const arrivalTaxiTimeInput = document.getElementById("arrivalTaxiTime");
    const airTimeInput = document.getElementById("airTime");

    let allFlights = new Map();
    let activeFlight = null;
    let countdownTimer = null;

    editButton.addEventListener("click", () => {
      flightsPage.classList.add("hidden");
      addFlightPage.classList.add("active");
    });

    backButton.addEventListener("click", () => {
      addFlightPage.classList.remove("active");
      flightsPage.classList.remove("hidden");
    });

    function formatDisplayDate(dateValue) {
      if (!dateValue) return "";

      const date = new Date(dateValue + "T00:00:00");

      return date.toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function formatShortDate(dateValue) {
      if (!dateValue) return "";

      const date = new Date(dateValue + "T00:00:00");

      return date.toLocaleDateString("en-US", {
        weekday: "short",
        day: "numeric",
        month: "short"
      }).toUpperCase();
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatTime12Hour(timeValue) {
      if (!timeValue) return "--:--";

      const [hourText, minuteText] = timeValue.split(":");
      let hour = Number(hourText);
      const minute = minuteText || "00";
      const suffix = hour >= 12 ? "PM" : "AM";

      hour = hour % 12;
      if (hour === 0) hour = 12;

      return `${hour}:${minute} ${suffix}`;
    }

    function buildLocalDateTime(dateValue, timeValue) {
      if (!dateValue || !timeValue) return null;

      return new Date(`${dateValue}T${timeValue}:00`);
    }

    function getDepartureDateTime(flight) {
      return buildLocalDateTime(flight.flightDateRaw, flight.scheduledDeparture);
    }

    function getArrivalDateTime(flight) {
      const departure = getDepartureDateTime(flight);
      const arrival = buildLocalDateTime(flight.flightDateRaw, flight.scheduledArrival);

      if (!departure || !arrival) return arrival;

      if (arrival <= departure) {
        arrival.setDate(arrival.getDate() + 1);
      }

      return arrival;
    }

    function formatCountdown(targetDate, actionWord) {
      if (!targetDate || Number.isNaN(targetDate.getTime())) {
        return `${actionWord} in --`;
      }

      const now = new Date();
      let diffMs = targetDate - now;

      if (diffMs <= 0) {
        if (actionWord === "Departs") return "Departing now";
        if (actionWord === "Arrives") return "Arriving now";
        return "Now";
      }

      const totalMinutes = Math.floor(diffMs / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;

      if (days > 0) {
        return `${actionWord} in ${days}d ${hours}h`;
      }

      if (hours > 0) {
        return `${actionWord} in ${hours}h ${minutes}m`;
      }

      return `${actionWord} in ${minutes}m`;
    }

    function formatPanelCountdown(targetDate) {
      if (!targetDate || Number.isNaN(targetDate.getTime())) {
        return "Gate Departure in --";
      }

      const now = new Date();
      let diffMs = targetDate - now;

      if (diffMs <= 0) {
        return "Gate Departure now";
      }

      const totalMinutes = Math.floor(diffMs / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;

      if (days > 0) {
        return `Gate Departure in ${days}d ${hours}h`;
      }

      if (hours > 0) {
        return `Gate Departure in ${hours}h ${minutes}m`;
      }

      return `Gate Departure in ${minutes}m`;
    }

    function createFlightCard(flight) {
      const card = document.createElement("button");
      card.className = "flight-card";
      card.type = "button";
      card.dataset.flightId = flight.id;

      const airline = escapeHTML(flight.airline || "AA");
      const flightNumber = escapeHTML(flight.flightNumber || "0000");
      const departureAirport = escapeHTML(flight.departureAirport || "DEP");
      const arrivalAirport = escapeHTML(flight.arrivalAirport || "ARR");
      const cityDeparture = escapeHTML(flight.cityDeparture || "Departure");
      const cityArrival = escapeHTML(flight.cityArrival || "Arrival");
      const flightDate = escapeHTML(flight.flightDate || "");

      card.innerHTML = `
        <div class="logo-space" aria-label="Airline logo space"></div>

        <div class="flight-main">
          <div class="flight-meta">
            <span>${airline} ${flightNumber}</span>
            <span>${departureAirport}</span>
            <span class="flight-route-arrow">→</span>
            <span>${arrivalAirport}</span>
          </div>

          <div class="flight-cities">${cityDeparture} to ${cityArrival}</div>
        </div>

        <div class="flight-date-display">${flightDate}</div>
      `;

      card.addEventListener("click", () => {
        const selectedFlight = allFlights.get(flight.id);
        if (selectedFlight) {
          openFlightDetails(selectedFlight);
        }
      });

      flightsList.appendChild(card);
    }

    function updateDetailCountdowns() {
      if (!activeFlight) return;

      const departureDateTime = getDepartureDateTime(activeFlight);
      const arrivalDateTime = getArrivalDateTime(activeFlight);

      gateStatusTitle.textContent = formatPanelCountdown(departureDateTime);
      detailDepartureCountdown.textContent = formatCountdown(departureDateTime, "Departs");
      detailArrivalCountdown.textContent = formatCountdown(arrivalDateTime, "Arrives");
    }

    function openFlightDetails(flight) {
      activeFlight = flight;

      detailMeta.textContent = `${flight.airline || "AA"} ${flight.flightNumber || "0000"} • ${formatShortDate(flight.flightDateRaw) || flight.flightDate || ""}`;
      detailRouteTitle.textContent = `${flight.cityDeparture || "Departure"} to ${flight.cityArrival || "Arrival"}`;

      detailDepartureAirport.textContent = `${flight.departureAirport || "DEP"} • ${flight.cityDeparture || "Departure"}`;
      detailDepartureTime.textContent = formatTime12Hour(flight.scheduledDeparture);
      detailFlightDuration.textContent = flight.flightTime || flight.airTime || "--";

      detailArrivalAirport.textContent = `${flight.arrivalAirport || "ARR"} • ${flight.cityArrival || "Arrival"}`;
      detailArrivalTime.textContent = formatTime12Hour(flight.scheduledArrival);

      updateDetailCountdowns();

      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(updateDetailCountdowns, 1000);

      detailPage.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function closeFlightDetails() {
      detailPage.classList.remove("active");
      activeFlight = null;

      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }

      document.body.style.overflow = "";
    }

    detailCloseButton.addEventListener("click", closeFlightDetails);

    function showNotification() {
      notificationOverlay.classList.add("active");
      flightAddedPopup.classList.remove("dismiss");
      flightAddedPopup.classList.add("active");
    }

    addFlightButton.addEventListener("click", async () => {
      const flight = {
        airline: airlineInput.value.trim().toUpperCase() || "AA",
        flightNumber: flightNumberInput.value.trim() || "0000",
        departureAirport: departureAirportInput.value.trim().toUpperCase() || "DEP",
        arrivalAirport: arrivalAirportInput.value.trim().toUpperCase() || "ARR",
        cityDeparture: cityDepartureInput.value.trim() || "Departure",
        cityArrival: cityArrivalInput.value.trim() || "Arrival",
        flightDate: formatDisplayDate(flightDateInput.value),
        flightDateRaw: flightDateInput.value || "",
        scheduledDeparture: scheduledDepartureInput.value || "",
        scheduledArrival: scheduledArrivalInput.value || "",
        flightTime: flightTimeInput.value.trim() || "",
        timezoneDifference: timezoneDifferenceInput.value.trim() || "",
        departureTaxiTime: departureTaxiTimeInput.value.trim() || "",
        arrivalTaxiTime: arrivalTaxiTimeInput.value.trim() || "",
        airTime: airTimeInput.value.trim() || "",
        createdAt: serverTimestamp()
      };

      addFlightButton.disabled = true;
      addFlightButton.style.opacity = "0.72";
      addFlightButton.style.cursor = "not-allowed";

      try {
        await addDoc(collection(db, "flights"), flight);
        flightForm.reset();
        showNotification();
      } catch (error) {
        console.error("Error adding flight:", error);
        alert("Flight could not be added. Check your Firestore rules and Firebase setup.");
      } finally {
        addFlightButton.disabled = false;
        addFlightButton.style.opacity = "1";
        addFlightButton.style.cursor = "pointer";
      }
    });

    const flightsQuery = query(collection(db, "flights"), orderBy("createdAt", "desc"));

    onSnapshot(flightsQuery, (snapshot) => {
      flightsList.innerHTML = "";
      allFlights.clear();

      snapshot.forEach((doc) => {
        const flight = {
          id: doc.id,
          ...doc.data()
        };

        allFlights.set(flight.id, flight);
        createFlightCard(flight);
      });
    }, (error) => {
      console.error("Error loading flights:", error);
    });

    function dismissNotification() {
      flightAddedPopup.classList.remove("active");
      flightAddedPopup.classList.add("dismiss");

      setTimeout(() => {
        notificationOverlay.classList.remove("active");
        flightAddedPopup.classList.remove("dismiss");
      }, 520);
    }

    flightAddedPopup.addEventListener("click", dismissNotification);

    flightAddedPopup.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        dismissNotification();
      }
    });
  </script>
</body>
</html>
