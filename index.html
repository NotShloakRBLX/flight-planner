<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSFS Flight Tracker</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(91, 95, 255, 0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(0, 194, 255, 0.12), transparent 30%),
        #070b18;
      color: white;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 18px;
    }

    .page-header {
      padding-top: 12px;
    }

    .page-title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1;
    }

    .header-line {
      width: 100%;
      height: 1px;
      margin-top: 18px;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0.85),
        rgba(120, 155, 255, 0.45),
        rgba(255, 255, 255, 0.08)
      );
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="page-header">
      <h1 class="page-title">Flights</h1>
      <div class="header-line"></div>
    </header>
  </main>
</body>
</html>
