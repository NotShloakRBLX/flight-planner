<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSFS Flight Planner</title>

<style>
:root {
  --bg-1:#050816;
  --bg-2:#0a1130;
  --bg-3:#04060f;
  --border:rgba(255,255,255,0.08);
  --text:#fff;
  --purple:#7c5cff;
  --blue:#4ca7ff;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Inter;
  color:var(--text);
  background:linear-gradient(160deg,var(--bg-1),var(--bg-2),var(--bg-3));
}

.screen{position:absolute;inset:0;padding:24px;}
.admin,.passenger,.addFlight,.editFlight{display:none;}
.admin-open .admin,
.passenger-open .passenger,
.add-open .addFlight,
.edit-open .editFlight{display:block;}

.card{
  max-width:1100px;margin:auto;padding:25px;
  background:rgba(20,25,60,0.7);
  border-radius:20px;border:1px solid var(--border);
}

.flight-card{
  padding:14px;border:1px solid var(--border);
  border-radius:12px;margin-top:10px;
  cursor:pointer;
}

.btn{
  padding:10px 14px;border-radius:10px;
  border:none;background:linear-gradient(135deg,var(--purple),var(--blue));
  color:white;cursor:pointer;margin-top:10px;
}

.red{background:#ff3b3b;}

.popup{margin-top:10px;}
input{padding:10px;margin-top:5px;width:100%;}
</style>
</head>

<body>

<div id="wrap">

<!-- ADMIN -->
<div class="screen admin">
<div class="card">
<h2>Flights (<span id="count">0</span>)</h2>
<div id="adminList"></div>
<button class="btn" id="addBtn">Add flight</button>
</div>
</div>

<!-- ADD -->
<div class="screen addFlight">
<div class="card">
<h2>Add Flight</h2>

<input id="dep" placeholder="Departure">
<input id="arr" placeholder="Arrival">
<input id="num" placeholder="Flight Number">

<button class="btn" id="saveNew">Add flight</button>
</div>
</div>

<!-- EDIT -->
<div class="screen editFlight">
<div class="card">
<h2>Edit Flight</h2>

<div>
<button class="btn" id="departedBtn">Departed</button>
<button class="btn" id="arrivedBtn">Arrived</button>
<button class="btn" id="delayedBtn">Delayed</button>
</div>

<div id="popupArea" class="popup"></div>

<button class="btn" id="saveEdit">Save</button>

<button class="btn red" id="deleteBtn">
🗑 Delete flight
</button>

</div>
</div>

<!-- PASSENGER -->
<div class="screen passenger">
<div class="card">
<h2>Flights (<span id="pCount">0</span>)</h2>
<div id="pList"></div>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  doc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDrFLJj44_ef4HVhu4QMbBFBtexn2HFMV4",
  authDomain: "msfs-flight-planner-986ca.firebaseapp.com",
  projectId: "msfs-flight-planner-986ca",
  storageBucket: "msfs-flight-planner-986ca.firebasestorage.app",
  messagingSenderId: "24985243023",
  appId: "1:24985243023:web:b9649fb038b3219dc28ffa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const wrap = document.getElementById("wrap");

let flights = [];
let currentId = null;
let editData = {};

// NAV
wrap.className = "admin-open";

addBtn.onclick=()=>wrap.className="add-open";

// ADD
saveNew.onclick = async () => {
  await addDoc(collection(db,"flights"),{
    dep:dep.value,
    arr:arr.value,
    num:num.value
  });
  load();
  wrap.className="admin-open";
};

// LOAD
async function load(){
  flights=[];
  const snap = await getDocs(collection(db,"flights"));
  snap.forEach(docSnap=>{
    flights.push({id:docSnap.id,...docSnap.data()});
  });

  count.textContent=flights.length;
  pCount.textContent=flights.length;

  adminList.innerHTML = flights.map(f=>`
    <div class="flight-card" onclick="openEdit('${f.id}')">
      ${f.num} — ${f.dep} → ${f.arr}
    </div>
  `).join("");

  pList.innerHTML = flights.map(f=>`
    <div class="flight-card">
      ${f.num} — ${f.dep} → ${f.arr}
    </div>
  `).join("");
}

// EDIT OPEN
window.openEdit = (id)=>{
  currentId=id;
  editData={};
  wrap.className="edit-open";
};

// POPUPS
departedBtn.onclick=()=>{
  popupArea.innerHTML=`Departure Time<input id="dTime">`;
  editData.type="departed";
};
arrivedBtn.onclick=()=>{
  popupArea.innerHTML=`Arrival Time<input id="aTime">`;
  editData.type="arrived";
};
delayedBtn.onclick=()=>{
  popupArea.innerHTML=`
  New Dep<input id="nd">
  New Arr<input id="na">
  `;
  editData.type="delayed";
};

// SAVE EDIT
saveEdit.onclick = async ()=>{
  let update={};

  if(editData.type==="departed"){
    update.actualDep=document.getElementById("dTime").value;
  }
  if(editData.type==="arrived"){
    update.actualArr=document.getElementById("aTime").value;
  }
  if(editData.type==="delayed"){
    update.dep=document.getElementById("nd").value;
    update.arr=document.getElementById("na").value;
  }

  await updateDoc(doc(db,"flights",currentId),update);

  wrap.className="admin-open";
  load();
};

// DELETE
deleteBtn.onclick = async ()=>{
  await deleteDoc(doc(db,"flights",currentId));
  wrap.className="admin-open";
  load();
};

load();
</script>

</body>
</html>
